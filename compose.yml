name: openclaw-mission-control
services:
  db:
    image: postgres:16-alpine
    container_name: openclaw-mission-control-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mission_control}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
    - postgres_data:/var/lib/postgresql/data
    ports:
    - 127.0.0.1:${POSTGRES_PORT:-5433}:5432
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB
      interval: 5s
      timeout: 3s
      retries: 20
  redis:
    image: redis:7-alpine
    container_name: openclaw-mission-control-redis
    ports:
    - 127.0.0.1:${REDIS_PORT:-6379}:6379
    healthcheck:
      test:
      - CMD
      - redis-cli
      - ping
      interval: 5s
      timeout: 3s
      retries: 5
  backend:
    container_name: openclaw-mission-control-backend
    env_file:
    - path: ./backend/.env
      required: false
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-mission_control}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      DB_AUTO_MIGRATE: ${DB_AUTO_MIGRATE:-true}
      AUTH_MODE: ${AUTH_MODE}
      LOCAL_AUTH_TOKEN: ${LOCAL_AUTH_TOKEN}
      BASE_URL: ${BASE_URL:-http://backend:8000}
      RQ_REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
    - ${BACKEND_PORT:-8000}:8000
    image: openclaw-mission-control-backend:latest
  frontend:
    container_name: openclaw-mission-control-frontend
    env_file:
    - path: ./frontend/.env
      required: false
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-auto}
      NEXT_PUBLIC_AUTH_MODE: ${AUTH_MODE}
    depends_on:
    - backend
    ports:
    - ${FRONTEND_PORT:-3000}:3000
    develop:
      watch:
      - action: rebuild
        path: ./frontend/src
      - action: rebuild
        path: ./frontend/package.json
      - action: rebuild
        path: ./frontend/package-lock.json
      - action: rebuild
        path: ./frontend/next.config.ts
      - action: rebuild
        path: ./frontend/postcss.config.js
      - action: rebuild
        path: ./frontend/tailwind.config.cjs
      - action: rebuild
        path: ./frontend/tsconfig.json
    image: openclaw-mission-control-frontend:latest
  webhook-worker:
    container_name: openclaw-mission-control-webhook-worker
    command:
    - python
    - scripts/rq-docker
    - worker
    env_file:
    - path: ./backend/.env
      required: false
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-mission_control}
      AUTH_MODE: ${AUTH_MODE}
      LOCAL_AUTH_TOKEN: ${LOCAL_AUTH_TOKEN}
      BASE_URL: ${BASE_URL:-http://backend:8000}
      RQ_REDIS_URL: redis://redis:6379/0
      RQ_QUEUE_NAME: ${RQ_QUEUE_NAME:-default}
      RQ_DISPATCH_THROTTLE_SECONDS: ${RQ_DISPATCH_THROTTLE_SECONDS:-2.0}
      RQ_DISPATCH_MAX_RETRIES: ${RQ_DISPATCH_MAX_RETRIES:-3}
    restart: always
    image: openclaw-mission-control-webhook-worker:latest
volumes:
  postgres_data: null
networks:
  default:
    name: searxng_manual
    external: true
